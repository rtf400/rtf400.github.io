title: Contact
icon: fa-envelope
order: 4
---

<p>Please fill out the blanks, if you want to contact me.\n
Then I'll reply to your message.</p>

<form method="post" action="https://formspree.io/{{ site.email }}">
  <div class="row">
    <div class="6u 12u$(mobile)"><input type="text" name="name" placeholder="Title" /></div>
    <div class="6u$ 12u$(mobile)"><input type="text" name="email" placeholder="Your Email" /></div>
    <div class="12u$">
      <textarea name="message" placeholder="Message"></textarea>
    </div>
    <div class="12u$">
      <input type="submit" value="Send Message" />
    </div>
  </div>
</form>
